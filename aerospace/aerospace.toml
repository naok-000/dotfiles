# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
  'exec-and-forget borders active_color=0xffcdd6f4 inactive_color=0xff494d64 width=5.0'
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = []

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       10
    outer.bottom =     10
    outer.top =        10
    outer.right =      10

[workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'main'
    5 = 'main'
    6 = ['EV2780', 'secondary']
    7 = ['EV2780', 'secondary']
    8 = ['EV2780', 'secondary']
    9 = ['EV2780', 'secondary']
    0 = ['EV2780', 'secondary']
    B = ['EV2780', 'secondary'] # Browsers (Arc, Chrome, Dia)
    E = 'main' # Entertainment (Spotify)
    M = ['EV2780', 'secondary'] # Message apps (Slack, Teams, Discord, Outlook, Mail)
    O = ['EV2780', 'secondary'] # Obsidian
    P = ['EV2780', 'secondary'] # PDF (Preview, Skim)
    Q = ['secondary']
    S = 'main' # Slides (Powerpoint)
    V = 'main' # VSCode
    W = 'main' # WezTerm
    Z = ['EV2780', 'secondary'] # zotero

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # cmd-alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    cmd-alt-slash = 'layout tiles horizontal vertical'
    cmd-alt-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    cmd-alt-h = 'focus left'
    cmd-alt-j = 'focus down'
    cmd-alt-k = 'focus up'
    cmd-alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    cmd-alt-shift-h = 'move left'
    cmd-alt-shift-j = 'move down'
    cmd-alt-shift-k = 'move up'
    cmd-alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    cmd-alt-minus = 'resize smart -50'
    cmd-alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    cmd-alt-1 = 'workspace 1'
    cmd-alt-2 = 'workspace 2'
    cmd-alt-3 = 'workspace 3'
    cmd-alt-4 = 'workspace 4'
    cmd-alt-5 = 'workspace 5'
    cmd-alt-6 = 'workspace 6'
    cmd-alt-7 = 'workspace 7'
    cmd-alt-8 = 'workspace 8'
    cmd-alt-9 = 'workspace 9'
    cmd-alt-0 = 'workspace 0'
    cmd-alt-a = 'workspace A'
    cmd-alt-b = ['exec-and-forget open /Applications/Zen.app', 'workspace B']
    # cmd-alt-c = 'workspace C'
    cmd-alt-d = ['exec-and-forget open /Applications/Discord.app', 'workspace M']
    cmd-alt-e = ['exec-and-forget open ~/Applications/Home\ Manager\ Apps/Emacs.app', 'workspace E']
    cmd-alt-f = 'exec-and-forget open /Applications/Finder.app'
    cmd-alt-g = 'workspace G'
    cmd-alt-i = 'workspace I'
    cmd-alt-m = ['exec-and-forget open /Applications/Slack.app', 'workspace M']
    cmd-alt-n = 'workspace N'
    cmd-alt-o = ['exec-and-forget open /Applications/Obsidian.app', 'workspace O']
    cmd-alt-p = 'workspace P'
    cmd-alt-q = 'workspace Q'
    cmd-alt-r = 'reload-config'
    cmd-alt-s = ['exec-and-forget open /Applications/Powerpoint.app', 'workspace S']
    cmd-alt-t = ['exec-and-forget open /Applications/Microsoft\ Teams.app', 'workspace M']
    cmd-alt-u = 'workspace U'
    cmd-alt-v = ['exec-and-forget open /Applications/Visual\ Studio\ Code.app', 'workspace V']
    cmd-alt-w = ['exec-and-forget open /Applications/WezTerm.app', 'workspace W']
    cmd-alt-x = 'workspace X'
    cmd-alt-y = 'workspace Y'
    cmd-alt-z = ['exec-and-forget open /Applications/Zotero.app', 'workspace Z']

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    cmd-alt-shift-1 = 'move-node-to-workspace 1'
    cmd-alt-shift-2 = 'move-node-to-workspace 2'
    cmd-alt-shift-3 = 'move-node-to-workspace 3'
    cmd-alt-shift-4 = 'move-node-to-workspace 4'
    cmd-alt-shift-5 = 'move-node-to-workspace 5'
    cmd-alt-shift-6 = 'move-node-to-workspace 6'
    cmd-alt-shift-7 = 'move-node-to-workspace 7'
    cmd-alt-shift-8 = 'move-node-to-workspace 8'
    cmd-alt-shift-9 = 'move-node-to-workspace 9'
    cmd-alt-shift-a = 'move-node-to-workspace A'
    cmd-alt-shift-b = 'move-node-to-workspace B'
    # cmd-alt-shift-c = 'move-node-to-workspace C'
    cmd-alt-shift-d = 'move-node-to-workspace D'
    cmd-alt-shift-e = 'move-node-to-workspace E'
    cmd-alt-shift-f = 'move-node-to-workspace F'
    cmd-alt-shift-g = 'move-node-to-workspace G'
    cmd-alt-shift-i = 'move-node-to-workspace I'
    cmd-alt-shift-m = 'move-node-to-workspace M'
    cmd-alt-shift-n = 'move-node-to-workspace N'
    cmd-alt-shift-o = 'move-node-to-workspace O'
    cmd-alt-shift-p = 'move-node-to-workspace P'
    cmd-alt-shift-q = 'move-node-to-workspace Q'
    cmd-alt-shift-r = 'move-node-to-workspace R'
    cmd-alt-shift-s = 'move-node-to-workspace S'
    cmd-alt-shift-t = 'move-node-to-workspace T'
    cmd-alt-shift-u = 'move-node-to-workspace U'
    cmd-alt-shift-v = 'move-node-to-workspace V'
    cmd-alt-shift-w = 'move-node-to-workspace W'
    cmd-alt-shift-x = 'move-node-to-workspace X'
    cmd-alt-shift-y = 'move-node-to-workspace Y'
    cmd-alt-shift-z = 'move-node-to-workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    cmd-alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    cmd-alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    cmd-alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    cmd-alt-shift-h = ['join-with left', 'mode main']
    cmd-alt-shift-j = ['join-with down', 'mode main']
    cmd-alt-shift-k = ['join-with up', 'mode main']
    cmd-alt-shift-l = ['join-with right', 'mode main']

# move some apps to specific workspaces

# Workspace 1: setting
[[on-window-detected]]
    if.app-id = 'com.apple.systempreferences'
    run = 'move-node-to-workspace 1'

# Workspace B: Browsers
## dia
[[on-window-detected]]
    if.app-id = 'company.thebrowser.dia'
    run = 'move-node-to-workspace B'
## Arc
[[on-window-detected]]
    if.app-id = 'company.thebrowser.Browser'
    run = 'move-node-to-workspace B'
## Chrome
[[on-window-detected]]
    if.app-id = 'com.google.Chrome'
    run = 'move-node-to-workspace B'
## Zen
[[on-window-detected]]
    if.app-id = 'app.zen-browser.zen'
    run = 'move-node-to-workspace B'

# workspace E: Emacs
[[on-window-detected]]
    if.app-id = 'org.gnu.Emacs'
    run = 'move-node-to-workspace E'

# Workspace F: finder
[[on-window-detected]]
    if.app-id = 'com.apple.finder'
    run = 'layout floating'

# Workspace M: message apps
## discord
[[on-window-detected]]
    if.app-id = 'com.hnc.Discord'
    run = ['move-node-to-workspace M']
## teams
[[on-window-detected]]
    if.app-id = 'com.microsoft.teams'
    run = ['move-node-to-workspace M', 'layout accordion horizontal vertical']
## slack
[[on-window-detected]]
    if.app-id = 'com.tinyspeck.slackmacgap'
    run = ['move-node-to-workspace M', 'layout accordion horizontal vertical']
## outlook
[[on-window-detected]]
    if.app-id = 'com.microsoft.Outlook'
    run = ['move-node-to-workspace M', 'layout accordion horizontal vertical']
## Apple Mail
[[on-window-detected]]
    if.app-id = 'com.apple.mail'
    run = ['move-node-to-workspace M', 'layout accordion horizontal vertical']

# Workspace O: obsidian
[[on-window-detected]]
    if.app-id = 'md.obsidian'
    run = ['move-node-to-workspace O', 'layout accordion horizontal vertical']

# Workspace P: PDF
## Preview
[[on-window-detected]]
    if.app-id = 'com.apple.Preview'
    run = 'move-node-to-workspace P'
## Skim
[[on-window-detected]]
    if.app-id = 'net.sourceforge.skim-app.skim'
    run = 'move-node-to-workspace P'

# Workspace S: Slides
[[on-window-detected]]
    if.app-id = 'com.microsoft.Powerpoint'
    run = 'move-node-to-workspace S'

# workspace V: VSCode
[[on-window-detected]]
    if.app-id = 'com.microsoft.VSCode'
    run = 'move-node-to-workspace V'

# workspace W: wezterm
[[on-window-detected]]
    if.app-id = 'com.github.wez.wezterm'
    run = 'move-node-to-workspace W'

# workspace Z: zotero
[[on-window-detected]]
    if.app-id = 'org.zotero.zotero'
    run = 'move-node-to-workspace Z'


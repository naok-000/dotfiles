name: update-czg

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 3"

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      NIX_CONFIG: accept-flake-config = true
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          github-token: ${{ github.token }}
      - name: Update czg package
        run: nix run github:Mic92/nix-update -- czg --flake --use-update-script
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES || github.token }}
          branch: update-czg
          base: main
          delete-branch: true
          commit-message: "chore(czg): update czg"
          title: "chore(czg): update czg"
          body: |
            Automated update of the custom `czg` package.
          labels: |
            dependencies
            nix
          add-paths: |
            nix/pkgs/czg.nix
